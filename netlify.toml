[build]
  command = "npm run build"
  publish = "dist"

# SPA: React Router (map + /edit)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Fresh content soon after save + redeploy
[[headers]]
  for = "/reviews-site.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
